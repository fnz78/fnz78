<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font: bold 48px 'Segoe UI', sans-serif; fill: white; }
.subtitle { font: 22px 'Segoe UI', sans-serif; fill: #d1d5db; }
.tag { font: 18px 'Segoe UI', sans-serif; fill: #9ca3af; }

@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-20px); }
100% { transform: translateY(0px); }
}

.particle {
animation: float 6s ease-in-out infinite;
}
</style>

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0f2027"/>
<stop offset="50%" stop-color="#203a43"/>
<stop offset="100%" stop-color="#2c5364"/>
</linearGradient>

</defs>

<!-- Background -->
<rect width="1200" height="320" fill="url(#bg)"/>

<!-- Particles -->
<circle class="particle" cx="100" cy="60" r="5" fill="white"/>
<circle class="particle" cx="300" cy="250" r="4" fill="white"/>
<circle class="particle" cx="600" cy="80" r="3" fill="white"/>
<circle class="particle" cx="900" cy="260" r="5" fill="white"/>
<circle class="particle" cx="1100" cy="120" r="4" fill="white"/>

<!-- Title -->
<text x="600" y="140" text-anchor="middle" class="title">
Hi 👋 I'm Farhan Nazim
</text>

<!-- Typing Animation -->
<text x="600" y="190" text-anchor="middle" class="subtitle">
AI & Data Analytics Developer
</text>

<!-- Tagline -->
<text x="600" y="230" text-anchor="middle" class="tag">
Building AI • Machine Learning • Data Science Projects 🚀
</text>

</svg>
