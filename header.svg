<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">

<!-- Gradient Background -->
<defs>
<linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0f2027"/>
<stop offset="50%" stop-color="#203a43"/>
<stop offset="100%" stop-color="#2c5364"/>
</linearGradient>
</defs>

<!-- Background -->
<rect width="1200" height="300" fill="url(#grad1)" />

<!-- Animated Circles -->
<circle cx="100" cy="50" r="6" fill="white">
<animate attributeName="cy" values="50;250;50" dur="6s" repeatCount="indefinite"/>
</circle>

<circle cx="1100" cy="200" r="5" fill="white">
<animate attributeName="cy" values="200;40;200" dur="5s" repeatCount="indefinite"/>
</circle>

<!-- Title -->
<text x="600" y="140" text-anchor="middle"
font-family="Verdana"
font-size="40"
fill="white"
font-weight="bold">
Hi 👋 I'm Farhan Nazim
</text>

<!-- Subtitle -->
<text x="600" y="190" text-anchor="middle"
font-family="Verdana"
font-size="22"
fill="#e0e0e0">
AI & Data Analytics Developer
</text>

<!-- Tagline -->
<text x="600" y="225" text-anchor="middle"
font-family="Verdana"
font-size="18"
fill="#cccccc">
Building intelligent solutions with data 🚀
</text>

</svg>
